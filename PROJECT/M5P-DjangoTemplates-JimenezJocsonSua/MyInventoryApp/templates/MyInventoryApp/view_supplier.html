{% extends 'MyInventoryApp/base.html' %}

{% block content %}

<h2>Suppliers</h2>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>City</th>
            <th>Country</th>
        </tr>
    </thead>

    <tbody>
        {% for s in suppliers %}
        <tr>
            <td>{{ s.name }}</td>
            <td>{{ s.city }}</td>
            <td>{{ s.country }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
